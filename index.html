<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadee Trading POS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-light overflow-hidden">


<div id="login-container" class="d-flex justify-content-center align-items-center vh-100 overflow-hidden">
    <div class="card shadow p-3" style="width: 340px;">

        <div class="text-center mb-3">
            <img src="assests/image/Nadee%20Trading%20Company%20(Pvt)%20Ltd.png"
                 class="img-fluid" style="max-height: 70px;">
        </div>

        <h5 class="text-center mb-3">Welcome</h5>

        <input type="text" class="form-control mb-2" placeholder="Username">
        <input type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-primary w-100" onclick="goToDashboard()">Login</button>
    </div>
</div>


<div id="app" class="d-none vh-100 overflow-hidden">

    <div class="d-flex vh-100 overflow-hidden">


        <div class="text-white p-3 vh-100 overflow-hidden shadow"
             style="width: 240px; background-color: #2196F3;">
            <div class="text-center mb-3">
                <h6>NADEE TRADING</h6>
                <small>Admin</small>
            </div>

            <hr>

            <button class="btn btn-outline-light w-100 mb-2 text-start" onclick="showCustomer()">
                <i class="fas fa-users me-2"></i> Customer
            </button>

            <button class="btn btn-outline-light w-100 mb-2 text-start" onclick="showItem()">
                <i class="fas fa-box me-2"></i> Item
            </button>

            <button class="btn btn-outline-light w-100 mb-3 text-start">
                <i class="fas fa-truck me-2"></i> Supplier
            </button>

            <p class="text-white small opacity-75">OPERATIONS</p>
            <button class="btn btn-outline-light w-100 mb-2 text-start">
                <i class="fas fa-shopping-cart me-2"></i> Orders
            </button>

            <button class="btn btn-outline-light w-100 mb-2 text-start">
                <i class="fas fa-file-invoice me-2"></i> Payments
            </button>

            <hr>

            <button class="btn btn-danger w-100" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>

        </div>


        <div class="flex-grow-1 p-3 vh-100 overflow-hidden">

            <div id="home">
                <div class="card shadow-sm text-center p-4">
                    <img src="assests/image/Nadee%20Trading%20Company%20(Pvt)%20Ltd.png"
                         class="mb-2 mx-auto d-block"
                         style="width: 220px;">

                    <h4>Nadee Trading Dashboard</h4>
                    <p class="text-muted mb-0">Select menu option</p>
                </div>
            </div>


            <div id="customer" class="d-none container-fluid py-2">

                <div class="row g-2">

                    <div class="col-lg-5">
                        <div class="p-3 bg-white border rounded shadow-sm">

                            <h5 class="text-center mb-3 text-primary fw-bold">
                                Customer Management
                            </h5>

                            <input type="number" class="form-control mb-2" id="id" placeholder="ID">
                            <input type="text" class="form-control mb-2" id="name" placeholder="Name">
                            <input type="text" class="form-control mb-2" id="phone" placeholder="Phone">
                            <input type="text" class="form-control mb-3" id="address" placeholder="Address">
                            <input type="email" class="form-control mb-3" id="email" placeholder="Email">

                            <div class="d-flex gap-2 justify-content-center">
                                <button class="btn btn-success btn-sm" onclick="addCustomer()">Save</button>
                                <button class="btn btn-primary btn-sm" onclick="updateCustomer()">Update</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteCustomer()">Delete</button>
                                <button class="btn btn-warning btn-sm" onclick="reset()">Reset</button>                            </div>
                        </div>
                    </div>

                    <div class="col-lg-7">
                        <div class="bg-white border rounded shadow-sm p-2">

                            <table class="table table-sm mb-0">
                                <thead class="table-primary">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Address</th>
                                    <th>Email</th>
                                </tr>
                                </thead>
                                <tbody id="tableBody"></tbody>
                            </table>

                        </div>
                    </div>

                </div>
            </div>

            <div id="item" class="d-none container-fluid py-2">

                <div class="row g-2">

                    <div class="col-lg-5">
                        <div class="p-3 bg-white border rounded shadow-sm">

                            <h5 class="text-center mb-3 text-primary fw-bold">
                                Item Management
                            </h5>

                            <input type="number" class="form-control mb-2" id="I-id" placeholder="Item ID">
                            <input type="text" class="form-control mb-2" id="I-name" placeholder="Item Name">
                            <input type="number" class="form-control mb-2" id="Qty" placeholder="Quantity">
                            <input type="number" class="form-control mb-3" id="unitPrice" placeholder="Unit Price">

                            <select class="form-select mb-3" id="category">
                                <option value="">Select Category</option>
                                <option value="Book">Book</option>
                                <option value="Pen">Pen</option>
                                <option value="Pencil">Pencil</option>
                            </select>

                            <div class="d-flex gap-2 justify-content-center">
                                <button class="btn btn-success btn-sm" onclick="addItem()">Save</button>
                                <button class="btn btn-primary btn-sm" onclick="updateItemr()">Update</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteItem()">Delete</button>
                                <button class="btn btn-warning btn-sm" onclick="resetItem()">Reset</button>
                            </div>

                        </div>
                    </div>

                    <div class="col-lg-7">
                        <div class="bg-white border rounded shadow-sm p-2">

                            <table class="table table-sm mb-0">
                                <thead class="table-primary">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Quantity</th>
                                    <th>Unit Price</th>
                                    <th>Category</th>
                                </tr>
                                </thead>
                                <tbody id="tableBody-I"></tbody>
                            </table>

                        </div>
                    </div>


        </div>
    </div>
</div>


<script>

    function goToDashboard(){
        document.getElementById("login-container").classList.add("d-none");
        document.getElementById("app").classList.remove("d-none");
    }

    function logout(){
        document.getElementById("app").classList.add("d-none");
        document.getElementById("login-container").classList.remove("d-none");
    }

    function showCustomer(){
        document.getElementById("home").classList.add("d-none");
        document.getElementById("item").classList.add("d-none");
        document.getElementById("customer").classList.remove("d-none");
    }

    let customers = [];
    let selectedIndex = -1;

    function addCustomer() {
        let idValue = document.getElementById("id").value;
        let nameValue = document.getElementById("name").value;
        let phoneValue = document.getElementById("phone").value;
        let addressValue = document.getElementById("address").value;
        let emailValue = document.getElementById("email").value;

        if (idValue && nameValue) {
            let c = {
                id: idValue,
                name: nameValue,
                phone: phoneValue,
                address: addressValue,
                email: emailValue
            };

            customers.push(c);
            renderCustomers();
            reset();
        } else {
            alert("Please enter at least the ID and Name.");
        }
    }

    function renderCustomers() {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        customers.forEach((c, i) => {
            tableBody.innerHTML += `
        <tr onclick="selectRow(${i})" style="cursor:pointer">
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.address}</td>
            <td>${c.email}</td>
        </tr>`;
        });
    }

    function selectRow(i) {
        selectedIndex = i;
        let c = customers[i];

        document.getElementById("id").value = c.id;
        document.getElementById("name").value = c.name;
        document.getElementById("phone").value = c.phone;
        document.getElementById("address").value = c.address;
        document.getElementById("email").value = c.email;
    }

    function updateCustomer() {
        if (selectedIndex === -1) {
            alert("Please select a row to update.");
            return;
        }

        customers[selectedIndex] = {
            id: document.getElementById("id").value,
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value,
            email: document.getElementById("email").value
        };

        renderCustomers();
        reset();
    }

    function deleteCustomer() {
        if (selectedIndex === -1) {
            alert("Please select a row to delete.");
            return;
        }

        if (confirm("Are you sure you want to delete this customer?")) {
            customers.splice(selectedIndex, 1);
            renderCustomers();
            reset();
        }
    }

    function reset() {
        document.getElementById("id").value = "";
        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("address").value = "";
        document.getElementById("email").value = "";
        selectedIndex = -1;
    }

    //=============================================
    function showItem() {
        document.getElementById("home").classList.add("d-none");
        document.getElementById("customer").classList.add("d-none");
        document.getElementById("item").classList.remove("d-none");
    }

    let items = [];
    let selectedItemIndex = -1;

    function addItem() {
        let item = {
            id: document.getElementById("I-id").value,
            name: document.getElementById("I-name").value,
            qty: document.getElementById("Qty").value,
            price: document.getElementById("unitPrice").value,
            category: document.getElementById("category").value
        };

        if (item.id && item.name) {
            items.push(item);
            renderItems();
            resetItem();
        } else {
            alert("Please enter at least the ID and Name.");
        }
    }

    function renderItems() {
        const tableBody = document.getElementById("tableBody-I");
        tableBody.innerHTML = "";

        items.forEach((item, index) => {
            tableBody.innerHTML += `
            <tr onclick="selectItemRow(${index})" style="cursor:pointer">
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td>${item.price}</td>
                <td>${item.category}</td>
            </tr>`;
        });
    }

    function selectItemRow(index) {
        selectedItemIndex = index;
        let item = items[index];

        document.getElementById("I-id").value = item.id;
        document.getElementById("I-name").value = item.name;
        document.getElementById("Qty").value = item.qty;
        document.getElementById("unitPrice").value = item.price;
        document.getElementById("category").value = item.category;
    }

    function updateItemr() {
        if (selectedItemIndex === -1) {
            alert("Please select a row to update.");
            return;
        }

        items[selectedItemIndex] = {
            id: document.getElementById("I-id").value,
            name: document.getElementById("I-name").value,
            qty: document.getElementById("Qty").value,
            price: document.getElementById("unitPrice").value,
            category: document.getElementById("category").value
        };

        renderItems();
        resetItem();
    }

    function deleteItem() {
        if (selectedItemIndex === -1) {
            alert("Please select a row to delete.");
            return;
        }

        if (confirm("Are you sure you want to delete this item?")) {
            items.splice(selectedItemIndex, 1);
            renderItems();
            resetItem();
        }
    }

    function resetItem() {
        document.getElementById("I-id").value = "";
        document.getElementById("I-name").value = "";
        document.getElementById("Qty").value = "";
        document.getElementById("unitPrice").value = "";
        document.getElementById("category").value = "";
        selectedItemIndex = -1;
    }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
