<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management - Bootstrap Only</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light overflow-hidden">
<div class="col-lg-5">
    <div class="p-3 bg-white border rounded shadow-sm">

        <h5 class="text-center mb-3 text-primary fw-bold">
            Item Management
        </h5>

        <input type="number" class="form-control mb-2" id="I-id" placeholder="Item ID">
        <input type="text" class="form-control mb-2" id="I-name" placeholder="Item Name">
        <input type="number" class="form-control mb-2" id="Qty" placeholder="Quantity">
        <input type="number" class="form-control mb-3" id="unitPrice" placeholder="Unit Price">
        <select class="form-select mb-3" id="category">
            <option value="">Select Category</option>
            <option value="Book">Book</option>
            <option value="Pen">Pen</option>
            <option value="Pencil">Pencil</option>
        </select>

        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-success btn-sm" onclick="addItem()">Save</button>
            <button class="btn btn-primary btn-sm" onclick="updateItemr()">Update</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem()">Delete</button>
            <button class="btn btn-warning btn-sm" onclick="resetItem()">Reset</button>                            </div>
    </div>
</div>

<div class="col-lg-7">
    <div class="bg-white border rounded shadow-sm p-2">

        <table class="table table-sm mb-0">
            <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>category</th>
            </tr>
            </thead>
            <tbody id="tableBody-I"></tbody>
        </table>

    </div>
</div>



</body>

<script>
    function showItem() {
        document.getElementById("home").classList.add("d-none");
        document.getElementById("customer").classList.add("d-none");
        document.getElementById("item").classList.remove("d-none");
    }

    let items = [];
    let selectedItemIndex = -1;

    function addItem() {
        let item = {
            id: document.getElementById("I-id").value,
            name: document.getElementById("I-name").value,
            qty: document.getElementById("Qty").value,
            price: document.getElementById("unitPrice").value,
            category: document.getElementById("category").value
        };

        if (item.id && item.name) {
            items.push(item);
            renderItems();
            resetItem();
        } else {
            alert("Please enter at least the ID and Name.");
        }
    }

    function renderItems() {
        const tableBody = document.getElementById("tableBody-I");
        tableBody.innerHTML = "";

        items.forEach((item, index) => {
            tableBody.innerHTML += `
            <tr onclick="selectItemRow(${index})" style="cursor:pointer">
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td>${item.price}</td>
                <td>${item.category}</td>
            </tr>`;
        });
    }

    function selectItemRow(index) {
        selectedItemIndex = index;
        let item = items[index];

        document.getElementById("I-id").value = item.id;
        document.getElementById("I-name").value = item.name;
        document.getElementById("Qty").value = item.qty;
        document.getElementById("unitPrice").value = item.price;
        document.getElementById("category").value = item.category;
    }

    function updateItemr() {
        if (selectedItemIndex === -1) {
            alert("Please select a row to update.");
            return;
        }

        items[selectedItemIndex] = {
            id: document.getElementById("I-id").value,
            name: document.getElementById("I-name").value,
            qty: document.getElementById("Qty").value,
            price: document.getElementById("unitPrice").value,
            category: document.getElementById("category").value
        };

        renderItems();
        resetItem();
    }

    function deleteItem() {
        if (selectedItemIndex === -1) {
            alert("Please select a row to delete.");
            return;
        }

        if (confirm("Are you sure you want to delete this item?")) {
            items.splice(selectedItemIndex, 1);
            renderItems();
            resetItem();
        }
    }

    function resetItem() {
        document.getElementById("I-id").value = "";
        document.getElementById("I-name").value = "";
        document.getElementById("Qty").value = "";
        document.getElementById("unitPrice").value = "";
        document.getElementById("category").value = "";
        selectedItemIndex = -1;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
