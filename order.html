<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place New Order - Bootstrap Only</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-info bg-opacity-10 p-4">

<div class="container" style="max-width: 900px;">

  <div id="order" class="d-none container-fluid py-2">
    <div class="container-fluid" style="max-width: 1000px;">
      <div class="d-flex align-items-center mb-3">
        <h2 class="text-primary fw-bold">Place New Order</h2>
      </div>

      <div class="card border-0 shadow-sm mb-0 rounded-top-4 rounded-bottom-0 d-inline-block p-3 bg-white">
        <div class="d-flex align-items-center gap-4">
          <div class="d-flex align-items-center gap-2">
            <span class="text-primary fw-bold small">Order ID:</span>
            <input type="text" id="O-id" class="form-control form-control-sm border-primary" style="width: 100px;" readonly>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="text-primary fw-bold small">Date:</span>
            <span id="O-date" class="fw-bold text-dark small">2026-01-04</span>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow rounded-4 rounded-tl-0 p-4 bg-white mb-3">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Select Customer</label>
            <select id="O-cust-select" class="form-select border-primary shadow-sm" onchange="loadOrderCustomerDetails()">
              <option value="" selected disabled>Choose Customer</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Customer Name</label>
            <div id="O-cust-name" class="text-primary fw-bold fs-5">Select a customer</div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Select Item</label>
            <select id="O-item-select" class="form-select border-primary shadow-sm" onchange="loadOrderItemDetails()">
              <option value="" selected disabled>Choose Item</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Item Name</label>
            <div id="O-item-display-name" class="text-primary fw-bold fs-5">Select an item</div>
          </div>

          <div class="col-12 d-flex align-items-center gap-3 py-2 border-bottom border-light">
            <div>
              <span class="text-secondary fw-semibold small">Unit Price:</span>
              <span id="O-unit-price" class="text-success fw-bold ms-2">Rs. 0.00</span>
            </div>
            <div class="vr text-secondary opacity-25"></div>
            <div>
              <span class="text-secondary fw-semibold small">Stock Available:</span>
              <span id="O-stock" class="text-danger fw-bold ms-2">0</span>
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label text-secondary fw-semibold small">Quantity</label>
            <input type="number" id="O-qty" class="form-control border-primary shadow-sm">
          </div>
          <div class="col-md-9 d-flex align-items-end">
            <button class="btn btn-primary px-4 fw-bold shadow-sm" onclick="addToCart()">+ Add to Cart</button>
          </div>

          <div class="col-12 mt-4">
            <h6 class="text-primary fw-bold mb-2">Order Cart</h6>
            <div class="table-responsive border rounded-3 overflow-hidden" style="max-height: 250px;">
              <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-light text-secondary small">
                <tr><th>Item ID</th><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>
                </thead>
                <tbody id="cartTableBody" class="bg-white"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow rounded-4 p-3 bg-white">
        <div class="d-flex justify-content-between align-items-center">
          <h4 class="text-primary fw-bold mb-0">NET TOTAL: <span class="text-success">Rs <span id="net-total">0.00</span></span></h4>
          <button class="btn btn-success btn-lg px-5 fw-bold shadow" onclick="placeOrder()">✓ Place Order</button>
        </div>
      </div>
    </div>
  </div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
