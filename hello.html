<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pos-System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<!-- MAIN APP -->
<div id="mainApp" class="d-none">

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="bg-primary bg-gradient text-white vh-100 p-3 position-fixed shadow" style="width: 250px;">

            <!-- BRAND -->
            <div class="d-flex align-items-center gap-2 mb-4">
                <span class="fs-4">🚗</span>
                <h5 class="fw-bold mb-0">Navi-Auto-Drive</h5>
            </div>

            <hr class="text-white">

            <!-- MENU -->
            <div class="nav flex-column gap-2">

                <a class="nav-link text-white active fw-bold" id="n_dash"
                   onclick="nav('dash')" style="cursor:pointer;">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>

                <a class="nav-link text-white-50" id="n_cust"
                   onclick="nav('cust')" style="cursor:pointer;">
                    <i class="bi bi-people me-2"></i> Customers
                </a>

                <a class="nav-link text-white-50" id="n_veh"
                   onclick="nav('veh')" style="cursor:pointer;">
                    <i class="bi bi-car-front me-2"></i> Vehicles
                </a>

                <a class="nav-link text-white-50" id="n_ord"
                   onclick="nav('ord')" style="cursor:pointer;">
                    <i class="bi bi-cart3 me-2"></i> New Order
                </a>

                <a class="nav-link text-white-50" id="n_hist"
                   onclick="nav('hist')" style="cursor:pointer;">
                    <i class="bi bi-receipt me-2"></i> Orders
                </a>

            </div>

            <hr class="text-white">

            <!-- LOGOUT -->
            <a class="nav-link text-danger fw-bold"
               onclick="doLogout()" style="cursor:pointer;">
                <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>

        </div>

        <!-- CONTENT AREA (important!) -->
        <div style="margin-left: 250px; width: 100%;" class="p-4">
            <h3>Dashboard Content Here</h3>
        </div>

    </div> <!-- end d-flex -->

</div> <!-- end mainApp -->

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
